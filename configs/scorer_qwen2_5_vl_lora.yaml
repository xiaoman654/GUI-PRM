model:
  name_or_path: Qwen/Qwen2.5-VL-3B-Instruct
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2

data:
  train_path: data/scorer/aitw_single/train.jsonl
  val_path: data/scorer/aitw_single/val.jsonl
  image_root: .
  max_pixels: 1003520
  min_pixels: 3136

prompt:
  system: You are a GUI action verifier. Answer only Yes or No.
  question: Is executing this exact candidate action at this exact location correct now for the current screen and instruction? Do not answer Yes just because the page or region is generally relevant.

training:
  output_dir: outputs/qwen2_5_vl_3b_action_scorer_lora
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0001
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  eval_steps: 100
  save_steps: 200
  bf16: true
  gradient_checkpointing: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
